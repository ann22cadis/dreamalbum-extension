<div id="DreamAlbum-editor-template">
    <div class="DreamAlbum-editor">
        <h3 class="DreamAlbum-editor-header flex-container justifyCenter alignItemsBaseline">
            <strong>Generated Block Editor</strong>
        </h3>
        
        <div class="DreamAlbum-editor-tabs flex-container justifyCenter">
            <div class="DreamAlbum-editor-tab menu_button active" data-tab="settings">
                <i class="fa-solid fa-gear"></i>
                <span>Block Settings</span>
            </div>
            <div class="DreamAlbum-editor-tab menu_button" data-tab="context">
                <i class="fa-solid fa-database"></i>
                <span>Context Builder</span>
            </div>
        </div>
        
        <hr>
        
        <div class="DreamAlbum-editor-body">
            <div id="DreamAlbum-editor-tab-settings" class="DreamAlbum-editor-tab-content">
                <div class="DreamAlbum-editor-settings flex-container flexFlowColumn">
                    <div class="flex-container flexFlowColumn">
                        <div class="flex1">
                            <label for="DreamAlbum-editor-block-name" class="title_restorable">
                                <small>Block Name</small>
                            </label>
                            <div>
                                <input
                                class="DreamAlbum-editor-block-name text_pole textarea_compact"
                                placeholder="Exact name without angle brackets."
                                type="text" />
                            </div>
                        </div>
                        
                        <div class="flex1 flex-container flexNoGap">
                            <small title="">
                                <span>Block Type</span>
                                <span class="fa-solid fa-circle-question note-link-span"></span>
                            </small>
                            <select name="DreamAlbum-editor-block-type" class="text_pole">
                                <option value="generated">Injectable</option>
                                <option value="rewrite">Rewrite</option>
                            </select>
                        </div>
                        
                        <div class="flex1">
                            <label for="DreamAlbum-editor-block-template" class="title_restorable">
                                <small>Block Template</small>
                            </label>
                            <div>
                                <textarea
                                class="DreamAlbum-editor-block-template text_pole wide100p textarea_compact"
                                placeholder="Template for the block."
                                rows="14"
                                ></textarea>
                            </div>
                        </div>
                        <div class="flex1">
                            <label for="DreamAlbum-editor-block-prompt" class="title_restorable">
                                <small>Block Prompt</small>
                            </label>
                            <div>
                                <textarea
                                class="DreamAlbum-editor-block-prompt text_pole wide100p textarea_compact"
                                placeholder="Prompt for the block."
                                rows="8"
                                ></textarea>
                            </div>
                        </div>
                    </div>
                    
                    <div class="flex-container">
                        <div class="flex1 wi-enter-footer-text flex-container flexFlowColumn flexNoGap alignitemsstart">
                            <small>Triggers</small>
                            <div title="Messages sent by the user and swipes.">
                                <label class="checkbox flex-container">
                                    <input type="checkbox" name="user_message">
                                    <span>User Message</span>
                                </label>
                            </div>
                            
                            <div title="Messages received from the Generation API.">
                                <label class="checkbox flex-container">
                                    <input type="checkbox" name="char_message">
                                    <span>Char Message</span>
                                </label>
                            </div>
                            
                            <div title="Stops generation when a keyword is found.">
                                <label class="checkbox flex-container">
                                    <input type="checkbox" name="generation_pause">
                                    <span>Generation Pause</span>
                                </label>
                            </div>
                            
                            <div class="flex-container wide100p marginTop5">
                                <div class="flex1 flex-container flexNoGap">
                                    <small title="">
                                        <span>Trigger periodicity</span>
                                        <span class="fa-solid fa-circle-question note-link-span"></span>
                                    </small>
                                    <select name="DreamAlbum-editor-trigger-periodicity" class="text_pole">
                                        <option value="periodic">Periodic</option>
                                        <option value="keyword">Keyword-based</option>
                                    </select>
                                </div>
                            </div>
                            
                            <div class="DreamAlbum-editor-period-wrapper flex-container wide100p marginTop5">
                                <div class="flex1 flex-container flexNoGap">
                                    <small title="">
                                        <span>Period</span>
                                        <span class="fa-solid fa-circle-question note-link-span"></span>
                                    </small>
                                    <input name="period" class="text_pole textarea_compact" type="number" min="0" max="999" placeholder="2" />
                                </div>
                            </div>
                            
                            <div class="DreamAlbum-editor-keyword-wrapper flex-container wide100p marginTop5">
                                <div class="flex1 flex-container flexNoGap">
                                    <div class="flex-container" style="align-items: baseline; justify-content: space-between;">
                                        <small title="">
                                            <span>Keyword</span>
                                            <span class="fa-solid fa-circle-question note-link-span"></span>
                                        </small>
                                        <div title="The keyword will be treated as a regular expression.">
                                            <label class="checkbox flex-container">
                                                <input type="checkbox" name="keyword_is_regex" />
                                                <span>Regex</span>
                                            </label>
                                        </div>
                                    </div>
                                    <input
                                    name="keyword"
                                    class="DreamAlbum-editor-keyword text_pole textarea_compact"
                                    type="text" />
                                </div>
                            </div>
                            
                            <small>State</small>
                            
                            <label class="checkbox flex-container">
                                <input type="checkbox" name="disabled" />
                                <span>Disabled</span>
                            </label>
                            
                            <div id="DreamAlbum-editor-hide-display-wrapper" title="Do not display blocks in chat.">
                                <label class="checkbox flex-container">
                                    <input type="checkbox" name="hide_display">
                                    <span>Hide From Display</span>
                                </label>
                            </div>
                            
                            <div id="DreamAlbum-editor-inject-block-wrapper">
                                <label class="checkbox flex-container">
                                    <input type="checkbox" name="inject_block" />
                                    <span>Inject Block</span>
                                </label>
                            </div>
                            
                            <div id="DreamAlbum-editor-background-wrapper" title="Generate the block in the background without waiting for it to finish.">
                                <label class="checkbox flex-container">
                                    <input type="checkbox" name="background" />
                                    <span>Background Generation</span>
                                </label>
                            </div>
                        </div>
                        
                        
                        <div class="flex1 wi-enter-footer-text flex-container flexFlowColumn flexNoGap alignitemsstart">
                            <div id="DreamAlbum-editor-inject-settings">
                                <div class="flex-container wide100p marginTop5">
                                    <div class="flex1 flex-container flexNoGap">
                                        <small title="">
                                            <span>Injection Role</span>
                                            <span class="fa-solid fa-circle-question note-link-span"></span>
                                        </small>
                                        <select name="DreamAlbum-editor-injection-role" class="text_pole">
                                            <option value="0">System</option>
                                            <option value="1">User</option>
                                            <option value="2">Assistant</option>
                                        </select>
                                    </div>
                                </div>
                                
                                <div class="flex-container wide100p marginTop5">
                                    <div class="flex1 flex-container flexNoGap">
                                        <small title="">
                                            <span>Injection Position</span>
                                            <span class="fa-solid fa-circle-question note-link-span"></span>
                                        </small>
                                        <select name="DreamAlbum-editor-injection-position" class="text_pole">
                                            <option value="0">After Main Prompt</option>
                                            <option value="1">In Chat</option>
                                            <option value="2">Before Main Prompt</option>
                                        </select>
                                    </div>
                                    
                                    <div class="flex-container wide100p marginTop5">
                                        <div class="flex1 flex-container flexNoGap">
                                            <small title="">
                                                <span>Injection Depth</span>
                                                <span class="fa-solid fa-circle-question note-link-span"></span>
                                            </small>
                                            <input name="injection_depth" class="text_pole textarea_compact" type="number" min="-999" max="999" placeholder="4" />
                                        </div>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="flex-container wide100p marginTop5" id="DreamAlbum-editor-generation-order-wrapper" style="display:none;">
                                <div class="flex1 flex-container flexNoGap">
                                    <small title="">
                                        <span>Generation Order</span>
                                        <span class="fa-solid fa-circle-question note-link-span"></span>
                                    </small>
                                    <select name="DreamAlbum-editor-generation-order" class="text_pole">
                                        <option value="before">Before blocks</option>
                                        <option value="after">After blocks</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div id="DreamAlbum-editor-tab-context" class="DreamAlbum-editor-tab-content" style="display:none;">
                <div class="DreamAlbum-editor-context flex-container flexFlowRow">
                    <div class="DreamAlbum-editor-context-list-pane flex-container flexFlowColumn">
                        <div class="DreamAlbum-editor-context-list-label justifyCenter">
                            <strong>Context Items</strong>
                            <div class="DreamAlbum-editor-context-list-actions">
                                <div class="DreamAlbum-editor-context-import menu_button menu_button_icon fa-solid fa-file-import" id="DreamAlbum-editor-context-import" title="Import context"></div>
                                <input type="file" id="DreamAlbum-editor-context-importFile" accept=".json" hidden>
                                <div class="DreamAlbum-editor-context-export menu_button menu_button_icon fa-solid fa-file-export" id="DreamAlbum-editor-context-export" title="Export context"></div>
                            </div>
                        </div>
                        <div id="DreamAlbum-editor-context-list" class="flex-container DreamAlbum-editor-context-container flexFlowColumn"></div>
                        <div class="DreamAlbum-preset-context-item-add menu_button menu_button_icon" id="DreamAlbum-editor-context-item-new" title="Add new context item">
                            <i class="fa-solid fa-plus"></i>
                            <small>Add Item</small>
                        </div>
                    </div>
                    
                    <div class="DreamAlbum-editor-context-editor-pane flex-container flexFlowColumn">
                        <div id="DreamAlbum-editor-context-editor-empty" class="flex-container justifyCenter alignItemsCenter flex1">
                            <small>Select an item to edit or click "Add Item"</small>
                        </div>
                        <div id="DreamAlbum-editor-context-editor-fields" class="flex-container flexFlowColumn" style="display:none;">
                            <div class="DreamAlbum-editor-context-builder flex1 flex-container flexNoGap flexFlowColumn alignitemsstart">
                                <small title="Type of context unit. Context items are separated from each other by new lines.">
                                    <span>Context Item Type</span>
                                    <span class="fa-solid fa-circle-question note-link-span"></span>
                                </small>
                                <select name="DreamAlbum-editor-context-item" class="text_pole">
                                    <option value="text">Text</option>
                                    <option value="last_messages">Last messages</option>
                                    <option value="last_messages_keyword">Last messages by keyword</option>
                                    <option value="previous_block">Previous block</option>
                                </select>
                                
                                <label for="DreamAlbum-editor-context-builder-name" class="title_restorable">
                                    <small>Item Name</small>
                                </label>
                                <div class="wide100p">
                                    <input
                                    class="DreamAlbum-editor-context-builder-name text_pole textarea_compact"
                                    type="text" />
                                </div>
                                
                                <label for="DreamAlbum-editor-context-builder-role" class="title_restorable">
                                    <small>Item Role</small>
                                </label>
                                <select name="DreamAlbum-editor-context-builder-role" class="text_pole">
                                    <option value="user">User</option>
                                    <option value="system">System</option>
                                    <option value="assistant">Assistant</option>
                                </select>
                                
                                <div id="DreamAlbum-editor-context-builder-text" class="wide100p">
                                    <label for="DreamAlbum-editor-context-builder-text-content" class="title_restorable">
                                        <small>Content</small>
                                    </label>
                                    <div class="wide100p">
                                        <textarea
                                        class="DreamAlbum-editor-context-builder-text-content text_pole wide100p textarea_compact"
                                        rows="12"
                                        ></textarea>
                                    </div>
                                </div>
                                
                                <div id="DreamAlbum-editor-context-builder-messages" style="display:none;" class="wide100p">
                                    <label for="DreamAlbum-editor-context-builder-messages-count" class="title_restorable">
                                        <small>Messages Count</small>
                                    </label>
                                    <input name="DreamAlbum-editor-context-builder-messages-count" class="text_pole textarea_compact" type="number" min="-999" max="999" placeholder="10" />
                                    <label for="DreamAlbum-editor-context-builder-messages-offset" class="title_restorable">
                                        <small>Messages Offset</small>
                                    </label>
                                    <input name="DreamAlbum-editor-context-builder-messages-offset" class="text_pole textarea_compact" type="number" min="0" max="999" placeholder="0" />
                                    <label for="DreamAlbum-editor-context-builder-messages-separator" class="title_restorable">
                                        <small>Messages Separator</small>
                                    </label>
                                    <select name="DreamAlbum-editor-context-builder-messages-separator" class="text_pole">
                                        <option value="double_newline">Double newline</option>
                                        <option value="newline">Newline</option>
                                        <option value="space">Space</option>
                                    </select>
                                    
                                    <label for="DreamAlbum-editor-context-builder-messages-userprefix" class="title_restorable">
                                        <small>User Prefix</small>
                                    </label>
                                    <div class="flex-container">
                                        <input
                                        class="DreamAlbum-editor-context-builder-messages-userprefix text_pole textarea_compact"
                                        type="text" />
                                    </div>
                                    
                                    <label for="DreamAlbum-editor-context-builder-messages-usersuffix" class="title_restorable">
                                        <small>User Suffix</small>
                                    </label>
                                    <div class="flex-container">
                                        <input
                                        class="DreamAlbum-editor-context-builder-messages-usersuffix text_pole textarea_compact"
                                        type="text" />
                                    </div>
                                    
                                    <label for="DreamAlbum-editor-context-builder-messages-charprefix" class="title_restorable">
                                        <small>Char Prefix</small>
                                    </label>
                                    <div class="flex-container">
                                        <input
                                        class="DreamAlbum-editor-context-builder-messages-charprefix text_pole textarea_compact"
                                        type="text" />
                                    </div>
                                    
                                    <label for="DreamAlbum-editor-context-builder-messages-charsuffix" class="title_restorable">
                                        <small>Char Suffix</small>
                                    </label>
                                    <div class="flex-container">
                                        <input
                                        class="DreamAlbum-editor-context-builder-messages-charsuffix text_pole textarea_compact"
                                        type="text" />
                                    </div>
                                </div>
                                
                                
                                <div id="DreamAlbum-editor-context-builder-keywordmessages" style="display:none;" class="wide100p">
                                    <label for="DreamAlbum-editor-context-builder-keywordmessages-keywordstopper" class="title_restorable">
                                        <small>Keyword Stopper</small>
                                    </label>
                                    <div class="flex-container">
                                        <input
                                        class="DreamAlbum-editor-context-builder-keywordmessages-keywordstopper text_pole textarea_compact"
                                        type="text" />
                                    </div>
                                    <label for="DreamAlbum-editor-context-builder-keywordmessages-separator" class="title_restorable">
                                        <small>Messages Separator</small>
                                    </label>
                                    <select name="DreamAlbum-editor-context-builder-keywordmessages-separator" class="text_pole">
                                        <option value="double_newline">Double newline</option>
                                        <option value="newline">Newline</option>
                                        <option value="space">Space</option>
                                    </select>
                                    
                                    <label for="DreamAlbum-editor-context-builder-keywordmessages-userprefix" class="title_restorable">
                                        <small>User Prefix</small>
                                    </label>
                                    <div class="flex-container">
                                        <input
                                        class="DreamAlbum-editor-context-builder-keywordmessages-userprefix text_pole textarea_compact"
                                        type="text" />
                                    </div>
                                    
                                    <label for="DreamAlbum-editor-context-builder-keywordmessages-usersuffix" class="title_restorable">
                                        <small>User Suffix</small>
                                    </label>
                                    <div class="flex-container">
                                        <input
                                        class="DreamAlbum-editor-context-builder-keywordmessages-usersuffix text_pole textarea_compact"
                                        type="text" />
                                    </div>
                                    
                                    <label for="DreamAlbum-editor-context-builder-keywordmessages-charprefix" class="title_restorable">
                                        <small>Char Prefix</small>
                                    </label>
                                    <div class="flex-container">
                                        <input
                                        class="DreamAlbum-editor-context-builder-keywordmessages-charprefix text_pole textarea_compact"
                                        type="text" />
                                    </div>
                                    
                                    <label for="DreamAlbum-editor-context-builder-keywordmessages-charsuffix" class="title_restorable">
                                        <small>Char Suffix</small>
                                    </label>
                                    <div class="flex-container">
                                        <input
                                        class="DreamAlbum-editor-context-builder-keywordmessages-charsuffix text_pole textarea_compact"
                                        type="text" />
                                    </div>
                                </div>
                                
                                
                                <div id="DreamAlbum-editor-context-builder-block" style="display:none;" class="wide100p">
                                    <label for="DreamAlbum-editor-context-builder-block-name" class="title_restorable">
                                        <small>Block Name</small>
                                    </label>
                                    <div class="wide100p">
                                        <input
                                        class="DreamAlbum-editor-context-builder-block-name text_pole textarea_compact"
                                        placeholder="Exact block name without angle brackets."
                                        type="text" />
                                    </div>
                                    <label for="DreamAlbum-editor-context-builder-block-count" class="title_restorable">
                                        <small>Blocks Count</small>
                                    </label>
                                    <input name="DreamAlbum-editor-context-builder-block-count" class="text_pole textarea_compact" type="number" min="1" max="999" placeholder="1" />
                                </div>
                                
                                <div class="DreamAlbum-editor-context-item-buttons marginTop10">
                                    <div class="DreamAlbum-preset-context-item-save menu_button menu_button_icon" id="DreamAlbum-editor-context-item-save" title="Save context item">
                                        <i class="fa-solid fa-save"></i>
                                        <small>Save Item</small>
                                    </div>
                                    <div class="DreamAlbum-preset-context-item-exit menu_button menu_button_icon" id="DreamAlbum-editor-context-item-exit" title="Exit edit mode">
                                        <i class="fa-solid fa-times"></i>
                                        <small>Cancel</small>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
        </div>
    </div>
</div>
