<div id="dreamalbum-selection-popup" class="dreamalbum-selection-popup" style="display: none;">
    <div class="dreamalbum-selection-popup-content">
        <div class="dreamalbum-selection-popup-header">
            <span>Partial Rewrite</span>
            <i id="dreamalbum-selection-popup-close" class="fa-solid fa-xmark interactable" title="Close"></i>
        </div>
        <div class="dreamalbum-selection-popup-body">
            <details class="dreamalbum-selection-text-details">
                <summary>Selected Text</summary>
                <div id="dreamalbum-selection-text-preview" class="dreamalbum-selection-text-preview"></div>
            </details>

            <label for="dreamalbum-selection-block-select">Rewrite Block:</label>
            <select id="dreamalbum-selection-block-select" class="text_pole">
                <!-- Options will be populated dynamically -->
            </select>
            
            <label for="dreamalbum-selection-additional-prompt">Additional Prompt:</label>
            <textarea id="dreamalbum-selection-additional-prompt" class="text_pole" placeholder="Enter additional instructions..."></textarea>
            
            <div class="dreamalbum-selection-popup-actions">
                <button id="dreamalbum-selection-rewrite-btn" class="menu_button">Rewrite</button>
            </div>
        </div>
    </div>
</div>
