<div id="DreamAlbum-accumulationeditor-template">
    <div class="DreamAlbum-accumulationeditor wide100p">
        <h3 class="flex-container justifyCenter alignItemsBaseline">
            <strong>Accumulation Block Editor</strong>
        </h3>

        <hr>

        <div class="flex-container flexFlowRow wide100p">
            <div class="DreamAlbum-accumulationeditor-settings wide100p">
                <div class="flex-container flexFlowColumn">
                    <div class="flex1">
                        <label for="DreamAlbum-accumulationeditor-block-name" class="title_restorable">
                            <small>Block Name</small>
                        </label>
                        <div>
                            <input
                                class="DreamAlbum-accumulationeditor-block-name text_pole textarea_compact"
                                placeholder="Exact name without angle brackets."
                                type="text" />
                        </div>
                    </div>

                    <div class="flex1">
                        <label for="DreamAlbum-accumulationeditor-blockupdater-name" class="title_restorable">
                            <small>Block-updater Name</small>
                        </label>
                        <div>
                            <input
                                class="DreamAlbum-accumulationeditor-blockupdater-name text_pole textarea_compact"
                                placeholder="Exact name without angle brackets (different from above)"
                                type="text" />
                        </div>
                    </div>
                </div>

                <br>

                <div class="flex-container">
                    <div class="flex1 wi-enter-footer-text flex-container flexFlowColumn flexNoGap alignitemsstart">
                        <small>Triggers</small>
                        <div title="Messages sent by the user and swipes.">
                            <label class="checkbox flex-container">
                                <input type="checkbox" name="user_message">
                                <span>User Message</span>
                            </label>
                        </div>

                        <div title="Messages received from the Generation API.">
                            <label class="checkbox flex-container">
                                <input type="checkbox" name="char_message">
                                <span>Char Message</span>
                            </label>
                        </div>

                        <small>State</small>

                        <label class="checkbox flex-container">
                            <input type="checkbox" name="disabled" />
                            <span>Disabled</span>
                        </label>

                        <div title="Do not display blocks in chat.">
                            <label class="checkbox flex-container">
                                <input type="checkbox" name="hide_display">
                                <span>Hide From Display</span>
                            </label>
                        </div>

                        <label class="checkbox flex-container">
                            <input type="checkbox" name="inject_block" />
                            <span>Inject block</span>
                        </label>
                    </div>


                    <div class="flex1 wi-enter-footer-text flex-container flexFlowColumn flexNoGap alignitemsstart">
                        <div class="flex-container wide100p marginTop5">
                            <div class="flex1 flex-container flexNoGap">
                                <small title="">
                                    <span>Injection Role</span>
                                    <span class="fa-solid fa-circle-question note-link-span"></span>
                                </small>
                                <select name="DreamAlbum-accumulationeditor-injection-role" class="text_pole">
                                    <option value="0">System</option>
                                    <option value="1">User</option>
                                    <option value="2">Assistant</option>
                                </select>
                            </div>
                        </div>

                        <div class="flex-container wide100p marginTop5">
                            <div class="flex1 flex-container flexNoGap">
                            <small title="">
                                <span>Injection Position</span>
                                <span class="fa-solid fa-circle-question note-link-span"></span>
                            </small>
                            <select name="DreamAlbum-accumulationeditor-injection-position" class="text_pole">
                                <option value="0">After Main Prompt</option>
                                <option value="1">In Chat</option>
                                <option value="2">Before Main Prompt</option>
                            </select>
                        </div>
                    </div>

                        <div class="flex-container wide100p marginTop5">
                            <div class="flex1 flex-container flexNoGap">
                                <small title="">
                                    <span>Injection Depth</span>
                                    <span class="fa-solid fa-circle-question note-link-span"></span>
                                </small>
                                <input name="injection_depth" class="text_pole textarea_compact" type="number" min="-999" max="999" placeholder="4" />
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <hr>

            <div class="flex-container justifyCenter marginTop10">
                <button id="DreamAlbum-accumulationeditor-copy-prompt" class="menu_button menu_button_compact">
                    <small>Copy Default Prompt</small>
                </button>
            </div>

        </div>
    </div>
</div>
